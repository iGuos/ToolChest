<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>百宝箱</title>
    <!-- 首屏底色：在 styles.css 加载前就按已存主题铺好背景，消除启动闪烁/错色 -->
    <style>
      html { background: #1e1e1e; }
      html, body { margin: 0; }
    </style>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem("baibao.settings.v1") || "{}");
        var t = s.theme || "dark";
        if (t === "system") {
          t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = t;
        document.documentElement.style.background = t === "light" ? "#ffffff" : "#1e1e1e";
      } catch (e) {}
    </script>
  </head>
  <!-- 关闭系统 WebView 的「首字母大写 / 自动更正(弹建议框) / 拼写检查」：
       这些属性会被后代 input/textarea 继承，省去运行时逐个处理 -->
  <body autocapitalize="off" autocorrect="off" spellcheck="false">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
